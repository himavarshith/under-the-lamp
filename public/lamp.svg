<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- outer circle -->
  <circle cx="50" cy="50" r="46" fill="white" stroke="#1a1a1a" stroke-width="3"/>
  <!-- open book: spine at top center, pages sweep down-left and down-right -->
  <line x1="50" y1="22" x2="28" y2="42" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="72" y2="42" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- book bottom edge (horizontal, like open pages resting flat) -->
  <line x1="24" y1="42" x2="76" y2="42" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- lamp stem -->
  <line x1="50" y1="42" x2="50" y2="63" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- base top bar -->
  <line x1="36" y1="63" x2="64" y2="63" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- base feet -->
  <line x1="36" y1="63" x2="30" y2="74" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="63" x2="70" y2="74" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- base bottom bar -->
  <line x1="26" y1="74" x2="74" y2="74" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
</svg>